name: Generate SVG

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVG
        run: node generate.js

      - name: Commit files
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add card.svg

          git commit -m "update svg" || echo "no changes"

          git push
